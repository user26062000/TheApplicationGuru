<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | The Application Guru</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo"><img src="assets/logo.png" alt="The Application Guru"></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="client-acceptances.html">Client Acceptances</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>
  <div class="nav-spacer"></div>

  <section class="booking">
    <img src="assets/logo.png" alt="The Application Guru" class="booking-logo">
    <form class="booking-form" action="https://formsubmit.co/theapplicationguru@icloud.com" method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>Name <span class="required">(Required)</span></label>
          <div class="form-row">
            <div class="form-group">
              <input type="text" name="first_name" required>
              <span class="form-hint">First</span>
            </div>
            <div class="form-group">
              <input type="text" name="last_name" required>
              <span class="form-hint">Last</span>
            </div>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email <span class="required">(Required)</span></label>
          <input type="email" name="email" required>
        </div>
        <div class="form-group">
          <label>Phone <span class="required">(Required)</span></label>
          <input type="tel" name="phone" required>
        </div>
      </div>
      <div class="form-group">
        <label>You're applying for a: <span class="required">(Required)</span></label>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="role" value="Undergraduate" required> Undergraduate degree</label>
          <label class="radio-label"><input type="radio" name="role" value="Masters"> Master's degree</label>
          <label class="radio-label"><input type="radio" name="role" value="PhD"> PhD</label>
          <label class="radio-label"><input type="radio" name="role" value="Honours degree"> Honours degree</label>
          <label class="radio-label"><input type="radio" name="role" value="Postgraduate (other)"> Postgraduate (other)</label>
        </div>
      </div>
      <div class="form-group">
        <label>Message <span class="required">(Required)</span></label>
        <textarea name="message" rows="6" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-submit">Submit</button>
    </form>
    <div class="booking-email">
      <p>Or reach out directly:</p>
      <a href="mailto:theapplicationguru@icloud.com" class="btn btn-contact">Email</a>
    </div>
  </section>
</body>
</html>
